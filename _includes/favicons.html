<!--
  Favicons for Web, Android, Microsoft, and iOS (PWA)
  Main icon: favicon-poro.png
-->

{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}

<link rel="icon" type="image/png" href="{{ favicon_path }}/favicon-poro.png" sizes="any">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon-poro.png">
<link rel="apple-touch-icon" href="{{ favicon_path }}/favicon-poro.png">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest">
{% endif %}
